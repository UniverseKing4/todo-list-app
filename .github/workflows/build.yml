name: Android Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Get version
        id: version
        run: |
          git fetch --tags --force
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "number=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            LATEST=$(git tag --sort=-v:refname | head -n1)
            [ -z "$LATEST" ] && LATEST="v0.0.0"
            VER=${LATEST#v}
            IFS='.' read -r MA MI PA <<< "$VER"
            echo "number=$MA.$MI.$((PA+1))" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          mv $(ls app-release*.apk | head -1) TodoList-v${{ steps.version.outputs.number }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/TodoList-*.apk

      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/release/TodoList-*.apk
          tag_name: v${{ steps.version.outputs.number }}
          name: Todo List v${{ steps.version.outputs.number }}
          body: "Release v${{ steps.version.outputs.number }}"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
